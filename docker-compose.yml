services:
  # ── Docker Socket Proxy (SEC-002) ────────────────────────────────────────
  # Filters Docker API access so the app can only list, start, and stop
  # containers — not create privileged ones or access host filesystems.
  socket-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: dock-dash-socket-proxy
    environment:
      CONTAINERS: 1  # allow listing & inspecting containers
      POST: 1        # allow start/stop/create/pull actions
      NETWORKS: 0
      SERVICES: 0
      VOLUMES: 0
      IMAGES: 1      # allow pulling images
      BUILD: 0
      SWARM: 0
      NODES: 0
      EXEC: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

      # Windows (Docker Desktop) — use ONE of the options below instead:
      #
      # Option A: Named pipe (recommended for Windows)
      #   Comment out the line above and uncomment this:
      #   - type: npipe
      #     source: \\.\pipe\docker_engine
      #     target: /var/run/docker.sock
      #
      # Option B: TCP — see dock-dash environment section below.
      #   Remove all volumes from this service and set
      #   DOCKER_HOST on dock-dash directly instead of using the proxy.
    networks:
      - socket-proxy-net
    restart: unless-stopped

  dock-dash:
    build: .
    image: dock-dash:latest
    container_name: dock-dash
    ports:
      - "3001:3001"
    volumes:
      # ── Persistent settings ────────────────────────────────────────────────
      - dock-dash-data:/app/packages/backend/data
      # No docker.sock mount — access goes through socket-proxy

    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - DOCKER_HOST=tcp://socket-proxy:2375
    depends_on:
      - socket-proxy
    networks:
      - socket-proxy-net
    restart: unless-stopped

networks:
  socket-proxy-net:
    driver: bridge

volumes:
  dock-dash-data:
