# HTTPS overlay — use with:
#   docker compose -f docker-compose.yml -f docker-compose.https.yml up -d
#
# Before starting, edit the Caddyfile to set your domain or use :443 for
# automatic self‑signed certs (Caddy's default when no domain is specified).

services:
  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
      - "127.0.0.1:443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - dock-dash
    networks:
      - frontend-net

  dock-dash:
    # Override: remove public port mapping, only expose internally to Caddy
    ports: !override
      - "3001"
    networks:
      - socket-proxy-net
      - frontend-net

networks:
  frontend-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
